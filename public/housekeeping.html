<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Housekeeping - Hotel Booking System</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
    .container { padding: 24px; }
    .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
    .top h1 { margin: 0 0 6px; font-size: 1.45rem; }
    .sub { margin: 0; color: #6b7280; font-size: .92rem; }
    .btn { border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: .9rem; }
    .btn-primary { background: #1a73e8; color: #fff; padding: 10px 14px; }
    .btn-secondary { background: #6b7280; color: #fff; padding: 9px 13px; }
    .btn-edit { background: #0d6efd; color: #fff; padding: 7px 11px; font-size: .8rem; }
    .btn-delete { background: #dc3545; color: #fff; padding: 7px 11px; font-size: .8rem; }
    .row { display: grid; grid-template-columns: 1.2fr 1fr; gap: 12px; margin-bottom: 12px; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .status-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; }
    .room-card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px; background: #fafafa; }
    .room-title { font-weight: 700; margin-bottom: 4px; }
    .small { font-size: .8rem; color: #6b7280; }
    .badge { display: inline-block; border-radius: 999px; padding: 4px 9px; font-size: .75rem; font-weight: 700; border: 1px solid transparent; }
    .clean { color: #166534; background: #ecfdf3; border-color: #86efac; }
    .dirty { color: #991b1b; background: #fee2e2; border-color: #fca5a5; }
    .progress { color: #1d4ed8; background: #eff6ff; border-color: #93c5fd; }
    .maintenance { color: #9a3412; background: #fff7ed; border-color: #fdba74; }
    .occupied { color: #6d28d9; background: #f3e8ff; border-color: #d8b4fe; }
    .filters { display: grid; grid-template-columns: 1fr 1fr 1fr auto auto; gap: 10px; margin-bottom: 12px; }
    input, select, textarea { width: 100%; border: 1px solid #d1d5db; border-radius: 8px; padding: 9px 10px; font-size: .9rem; font-family: inherit; }
    textarea { min-height: 84px; resize: vertical; }
    .table-wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 980px; }
    th, td { padding: 11px; text-align: left; border-bottom: 1px solid #eee; font-size: .88rem; vertical-align: top; }
    th { font-size: .8rem; text-transform: uppercase; color: #4b5563; background: #f8f9fa; }
    .actions { display: flex; gap: 8px; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 2100; align-items: center; justify-content: center; padding: 12px; }
    .modal-overlay.open { display: flex; }
    .modal { width: 100%; max-width: 760px; background: #fff; border-radius: 12px; padding: 20px; max-height: 92vh; overflow: auto; }
    .modal h2 { margin: 0 0 14px; font-size: 1.1rem; color: #1a73e8; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: grid; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: .83rem; font-weight: 600; color: #4b5563; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
    .empty { padding: 24px; text-align: center; color: #6b7280; border: 1px dashed #d1d5db; border-radius: 10px; }
    @media (max-width: 1100px) { .row { grid-template-columns: 1fr; } .status-grid { grid-template-columns: repeat(2, minmax(0,1fr)); } .filters { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 760px) { .status-grid { grid-template-columns: 1fr; } .top { flex-direction: column; align-items: stretch; } .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="app-navbar"></div>
  <div class="main-content">
    <div class="container">
      <div class="top">
        <div>
          <h1>Housekeeping</h1>
          <p class="sub">Room status management, cleaning tasks, and maintenance tracking</p>
        </div>
        <button class="btn btn-primary" onclick="openTaskModal()">+ Assign Task</button>
      </div>

      <div class="row">
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;">
            <h3 style="margin:0;font-size:1rem;">Room Status Grid</h3>
            <select id="statusFilter" style="max-width:220px;"><option value="">All Status</option><option>Clean</option><option>Dirty</option><option>In Progress</option><option>Maintenance</option><option>Occupied</option></select>
          </div>
          <div id="roomGrid" class="status-grid"></div>
        </div>

        <div class="card">
          <h3 style="margin:0 0 10px;font-size:1rem;">Quick Status Update</h3>
          <div class="form-group" style="margin-bottom:8px;"><label>Room Number</label><select id="qsRoom"></select></div>
          <div class="form-group" style="margin-bottom:8px;"><label>Status</label><select id="qsStatus"><option>Clean</option><option>Dirty</option><option>In Progress</option><option>Maintenance</option><option>Occupied</option></select></div>
          <div class="form-group" style="margin-bottom:8px;"><label>Assigned Staff ID (optional)</label><input id="qsStaff" placeholder="e.g. 1"></div>
          <button class="btn btn-secondary" onclick="saveQuickStatus()">Update Room Status</button>
        </div>
      </div>

      <div class="card">
        <div class="filters">
          <select id="qTaskStatus"><option value="">All Task Status</option><option>Clean</option><option>Dirty</option><option>In Progress</option><option>Maintenance</option><option>Occupied</option></select>
          <select id="qPriority"><option value="">All Priorities</option><option>Urgent</option><option>High</option><option>Normal</option><option>Low</option></select>
          <select id="qRoom"><option value="">All Rooms</option></select>
          <button class="btn btn-secondary" onclick="loadTasks()">Filter</button>
          <button class="btn btn-secondary" onclick="resetFilters()">Reset</button>
        </div>
        <div id="taskTable" class="table-wrap"><div class="empty">Loading tasks...</div></div>
      </div>
    </div>
  </div>

  <div id="taskModal" class="modal-overlay">
    <div class="modal">
      <h2 id="taskModalTitle">Assign Housekeeping Task</h2>
      <form id="taskForm">
        <div class="form-grid">
          <div class="form-group"><label>Room Number</label><select id="fRoom" required></select></div>
          <div class="form-group"><label>Staff</label><select id="fStaff"></select></div>
          <div class="form-group"><label>Status</label><select id="fStatus" required><option>Dirty</option><option>In Progress</option><option>Clean</option><option>Maintenance</option><option>Occupied</option></select></div>
          <div class="form-group"><label>Priority</label><select id="fPriority" required><option>Normal</option><option>High</option><option>Urgent</option><option>Low</option></select></div>
          <div class="form-group"><label>Assigned Date/Time</label><input id="fAssigned" type="datetime-local" required></div>
          <div class="form-group"><label>Completed Date/Time</label><input id="fCompleted" type="datetime-local"></div>
          <div class="form-group full"><label>Notes</label><textarea id="fNotes" placeholder="Issues found, special requests, maintenance details..."></textarea></div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
          <button class="btn btn-primary" type="submit" id="saveBtn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div id="deleteModal" class="modal-overlay">
    <div class="modal" style="max-width:420px;">
      <h2>Delete Task</h2>
      <p id="deleteText">Are you sure?</p>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
        <button type="button" class="btn btn-delete" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <script src="/sitesh/app.js"></script>
  <script>
    if (!initAppPage('housekeeping')) throw new Error('Not authenticated');

    const ROOM_STATUS_API = BASE + '/api/room-status';
    const TASK_API = BASE + '/api/housekeeping-tasks';
    const STAFF_API = BASE + '/api/staff';
    const ROOMS_API = BASE + '/api/rooms/capacity';

    let roomStatus = [];
    let tasks = [];
    let staff = [];
    let rooms = [];
    let editingId = null;
    let deleteId = null;

    const roomGrid = document.getElementById('roomGrid');
    const taskTable = document.getElementById('taskTable');
    const taskModal = document.getElementById('taskModal');
    const deleteModal = document.getElementById('deleteModal');
    const taskForm = document.getElementById('taskForm');

    function esc(v) { return String(v || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
    function toLocalDateTimeValue(iso) {
      const d = iso ? new Date(iso) : new Date();
      if (Number.isNaN(d.getTime())) return '';
      const p = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
    }
    function fmtDate(value) {
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return '-';
      return d.toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }
    function statusClass(status) {
      if (status === 'Clean') return 'clean';
      if (status === 'Dirty') return 'dirty';
      if (status === 'In Progress') return 'progress';
      if (status === 'Maintenance') return 'maintenance';
      return 'occupied';
    }

    function renderRoomGrid() {
      if (!roomStatus.length) {
        roomGrid.innerHTML = '<div class="empty">No room status found.</div>';
        return;
      }
      roomGrid.innerHTML = roomStatus.map((r) => `
        <div class="room-card">
          <div class="room-title">Room ${esc(r.room_number)}</div>
          <div style="margin-bottom:6px;"><span class="badge ${statusClass(r.status)}">${esc(r.status)}</span></div>
          <div class="small">Assigned: ${esc(r.assigned_staff_name || '-')}</div>
          <div class="small">Last Cleaned: ${r.last_cleaned ? fmtDate(r.last_cleaned) : '-'}</div>
        </div>
      `).join('');
    }

    function renderTasks() {
      if (!tasks.length) {
        taskTable.innerHTML = '<div class="empty">No housekeeping tasks found.</div>';
        return;
      }

      const rows = tasks.map((t) => `
        <tr>
          <td>#${t.id}</td>
          <td>Room ${esc(t.room_number)}</td>
          <td>${esc(t.staff_name || '-')}</td>
          <td><span class="badge ${statusClass(t.status)}">${esc(t.status)}</span></td>
          <td>${esc(t.priority)}</td>
          <td>${fmtDate(t.assigned_date)}</td>
          <td>${t.completed_date ? fmtDate(t.completed_date) : '-'}</td>
          <td>${esc(t.notes || '-')}</td>
          <td>
            <div class="actions">
              <button class="btn btn-edit" onclick="openTaskModal(${t.id})">Edit</button>
              <button class="btn btn-delete" onclick="openDeleteModal(${t.id})">Delete</button>
            </div>
          </td>
        </tr>
      `).join('');

      taskTable.innerHTML = `
        <table>
          <thead><tr><th>ID</th><th>Room</th><th>Staff</th><th>Status</th><th>Priority</th><th>Assigned</th><th>Completed</th><th>Notes</th><th>Actions</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function populateCommonSelectors() {
      const roomOptions = rooms.map((r) => `<option value="${r}">Room ${r}</option>`).join('');
      document.getElementById('fRoom').innerHTML = roomOptions;
      document.getElementById('qsRoom').innerHTML = roomOptions;
      document.getElementById('qRoom').innerHTML = '<option value="">All Rooms</option>' + roomOptions;

      const staffOptions = '<option value="">Unassigned</option>' + staff.map((s) => `<option value="${s.id}">${esc(s.name)} (${esc(s.role)})</option>`).join('');
      document.getElementById('fStaff').innerHTML = staffOptions;
    }

    async function loadRooms() {
      const res = await fetch(ROOMS_API, { headers: Auth.headers() });
      if (res.status === 401 || res.status === 403) return Auth.logout();
      if (!res.ok) return showToast('Failed to load rooms', 'error');
      const map = await res.json();
      rooms = Object.keys(map).sort();
    }

    async function loadStaff() {
      const res = await fetch(STAFF_API, { headers: Auth.headers() });
      if (res.status === 401 || res.status === 403) return Auth.logout();
      if (!res.ok) return showToast('Failed to load staff', 'error');
      staff = await res.json();
    }

    async function loadRoomStatus() {
      const status = document.getElementById('statusFilter').value;
      const qp = status ? `?status=${encodeURIComponent(status)}` : '';
      try {
        const res = await fetch(ROOM_STATUS_API + qp, { headers: Auth.headers() });
        if (res.status === 401 || res.status === 403) return Auth.logout();
        if (!res.ok) return showToast('Failed to load room status', 'error');
        roomStatus = await res.json();
        renderRoomGrid();
      } catch {
        showToast('Failed to load room status', 'error');
      }
    }

    function buildTaskQuery() {
      const qp = new URLSearchParams();
      const status = document.getElementById('qTaskStatus').value;
      const priority = document.getElementById('qPriority').value;
      const room = document.getElementById('qRoom').value;
      if (status) qp.set('status', status);
      if (priority) qp.set('priority', priority);
      if (room) qp.set('room_number', room);
      const s = qp.toString();
      return s ? `?${s}` : '';
    }

    async function loadTasks() {
      taskTable.innerHTML = '<div class="empty">Loading tasks...</div>';
      try {
        const res = await fetch(TASK_API + buildTaskQuery(), { headers: Auth.headers() });
        if (res.status === 401 || res.status === 403) return Auth.logout();
        if (!res.ok) {
          taskTable.innerHTML = '<div class="empty">Failed to load tasks.</div>';
          return;
        }
        tasks = await res.json();
        renderTasks();
      } catch {
        taskTable.innerHTML = '<div class="empty">Failed to load tasks.</div>';
      }
    }

    function resetFilters() {
      document.getElementById('qTaskStatus').value = '';
      document.getElementById('qPriority').value = '';
      document.getElementById('qRoom').value = '';
      loadTasks();
    }

    function resetForm() {
      taskForm.reset();
      editingId = null;
      document.getElementById('taskModalTitle').textContent = 'Assign Housekeeping Task';
      document.getElementById('saveBtn').textContent = 'Save';
      document.getElementById('fStatus').value = 'Dirty';
      document.getElementById('fPriority').value = 'Normal';
      document.getElementById('fAssigned').value = toLocalDateTimeValue(new Date().toISOString());
      document.getElementById('fCompleted').value = '';
    }

    function openTaskModal(id = null) {
      resetForm();
      if (id) {
        const t = tasks.find((x) => x.id === id);
        if (!t) return showToast('Task not found', 'error');
        editingId = id;
        document.getElementById('taskModalTitle').textContent = `Edit Task #${id}`;
        document.getElementById('saveBtn').textContent = 'Update';
        document.getElementById('fRoom').value = t.room_number;
        document.getElementById('fStaff').value = t.staff_id || '';
        document.getElementById('fStatus').value = t.status;
        document.getElementById('fPriority').value = t.priority;
        document.getElementById('fAssigned').value = toLocalDateTimeValue(t.assigned_date);
        document.getElementById('fCompleted').value = t.completed_date ? toLocalDateTimeValue(t.completed_date) : '';
        document.getElementById('fNotes').value = t.notes || '';
      }
      taskModal.classList.add('open');
    }

    function closeTaskModal() { taskModal.classList.remove('open'); resetForm(); }

    function openDeleteModal(id) {
      const t = tasks.find((x) => x.id === id);
      if (!t) return showToast('Task not found', 'error');
      deleteId = id;
      document.getElementById('deleteText').textContent = `Delete task #${id} for Room ${t.room_number}?`;
      deleteModal.classList.add('open');
    }

    function closeDeleteModal() { deleteId = null; deleteModal.classList.remove('open'); }

    async function confirmDelete() {
      if (!deleteId) return;
      try {
        const res = await fetch(`${TASK_API}/${deleteId}`, { method: 'DELETE', headers: Auth.headers() });
        if (res.status === 401 || res.status === 403) return Auth.logout();
        if (!res.ok) {
          const j = await res.json();
          return showToast(j.error || 'Failed to delete task', 'error');
        }
        showToast('Task deleted successfully', 'success');
        closeDeleteModal();
        loadTasks();
        loadRoomStatus();
      } catch {
        showToast('Failed to delete task', 'error');
      }
    }

    taskForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        room_number: document.getElementById('fRoom').value,
        staff_id: document.getElementById('fStaff').value || null,
        status: document.getElementById('fStatus').value,
        priority: document.getElementById('fPriority').value,
        assigned_date: new Date(document.getElementById('fAssigned').value).toISOString(),
        completed_date: document.getElementById('fCompleted').value ? new Date(document.getElementById('fCompleted').value).toISOString() : '',
        notes: document.getElementById('fNotes').value.trim()
      };

      const method = editingId ? 'PUT' : 'POST';
      const url = editingId ? `${TASK_API}/${editingId}` : TASK_API;

      try {
        const res = await fetch(url, { method, headers: Auth.headers(), body: JSON.stringify(payload) });
        if (res.status === 401 || res.status === 403) return Auth.logout();
        const j = await res.json();
        if (!res.ok) return showToast(j.error || 'Failed to save task', 'error');
        showToast(editingId ? 'Task updated' : 'Task assigned', 'success');
        closeTaskModal();
        loadTasks();
        loadRoomStatus();
      } catch {
        showToast('Failed to save task', 'error');
      }
    });

    async function saveQuickStatus() {
      const room = document.getElementById('qsRoom').value;
      const status = document.getElementById('qsStatus').value;
      const staffId = document.getElementById('qsStaff').value.trim();
      try {
        const res = await fetch(`${ROOM_STATUS_API}/${encodeURIComponent(room)}`, {
          method: 'POST',
          headers: Auth.headers(),
          body: JSON.stringify({
            status,
            assigned_staff: staffId,
            last_cleaned: status === 'Clean' ? new Date().toISOString() : ''
          })
        });
        if (res.status === 401 || res.status === 403) return Auth.logout();
        const j = await res.json();
        if (!res.ok) return showToast(j.error || 'Failed to update room status', 'error');
        showToast('Room status updated', 'success');
        loadRoomStatus();
      } catch {
        showToast('Failed to update room status', 'error');
      }
    }

    taskModal.addEventListener('click', (e) => { if (e.target === taskModal) closeTaskModal(); });
    deleteModal.addEventListener('click', (e) => { if (e.target === deleteModal) closeDeleteModal(); });
    document.getElementById('statusFilter').addEventListener('change', loadRoomStatus);

    window.openTaskModal = openTaskModal;
    window.closeTaskModal = closeTaskModal;
    window.openDeleteModal = openDeleteModal;
    window.closeDeleteModal = closeDeleteModal;
    window.confirmDelete = confirmDelete;
    window.saveQuickStatus = saveQuickStatus;
    window.loadTasks = loadTasks;
    window.resetFilters = resetFilters;

    (async function init() {
      await Promise.all([loadRooms(), loadStaff()]);
      populateCommonSelectors();
      resetForm();
      loadRoomStatus();
      loadTasks();
    })();
  </script>
</body>
</html>
