<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Housekeeping - Hotel Booking System</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
    .container { padding: 24px; }
    .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
    .top h1 { margin: 0 0 6px; font-size: 1.45rem; }
    .sub { margin: 0; color: #6b7280; font-size: .92rem; }
    .btn { border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: .9rem; }
    .btn-primary { background: #1a73e8; color: #fff; padding: 10px 14px; }
    .btn-secondary { background: #6b7280; color: #fff; padding: 9px 13px; }
    .btn-edit { background: #0d6efd; color: #fff; padding: 7px 11px; font-size: .8rem; }
    .btn-delete { background: #dc3545; color: #fff; padding: 7px 11px; font-size: .8rem; }
    .btn-save { background: #2563eb; color: #fff; padding: 7px 10px; font-size: .8rem; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .filters { display: grid; grid-template-columns: 1.2fr 1fr 1fr auto auto; gap: 10px; margin-bottom: 12px; }
    input, select, textarea { width: 100%; border: 1px solid #d1d5db; border-radius: 8px; padding: 9px 10px; font-size: .9rem; font-family: inherit; }
    textarea { min-height: 80px; resize: vertical; }
    .status-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 12px; }
    .room-card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px; background: #fafafa; display: grid; gap: 8px; }
    .room-title { font-weight: 700; margin-bottom: 2px; }
    .small { font-size: .8rem; color: #6b7280; }
    .badge { display: inline-block; border-radius: 999px; padding: 4px 9px; font-size: .75rem; font-weight: 700; border: 1px solid transparent; }
    .clean { color: #166534; background: #ecfdf3; border-color: #86efac; }
    .dirty { color: #991b1b; background: #fee2e2; border-color: #fca5a5; }
    .progress { color: #1d4ed8; background: #eff6ff; border-color: #93c5fd; }
    .maintenance { color: #9a3412; background: #fff7ed; border-color: #fdba74; }
    .table-wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 980px; }
    th, td { padding: 11px; text-align: left; border-bottom: 1px solid #eee; font-size: .88rem; vertical-align: top; }
    th { font-size: .8rem; text-transform: uppercase; color: #4b5563; background: #f8f9fa; }
    .actions { display: flex; gap: 8px; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 2100; align-items: center; justify-content: center; padding: 12px; }
    .modal-overlay.open { display: flex; }
    .modal { width: 100%; max-width: 760px; background: #fff; border-radius: 12px; padding: 20px; max-height: 92vh; overflow: auto; }
    .modal h2 { margin: 0 0 14px; font-size: 1.1rem; color: #1a73e8; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: grid; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: .83rem; font-weight: 600; color: #4b5563; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
    .empty { padding: 24px; text-align: center; color: #6b7280; border: 1px dashed #d1d5db; border-radius: 10px; }
    @media (max-width: 1200px) { .status-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
    @media (max-width: 1100px) { .status-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } .filters { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 760px) { .status-grid { grid-template-columns: 1fr; } .top { flex-direction: column; align-items: stretch; } .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="app-navbar"></div>
  <div class="main-content">
    <div class="container">
      <div class="top">
        <div>
          <h1>Housekeeping</h1>
          <p class="sub">Room status board and housekeeping task assignments</p>
        </div>
        <button class="btn btn-primary" onclick="openTaskModal()">+ Assign Task</button>
      </div>

      <div class="card" style="margin-bottom:12px;">
        <div class="filters" style="margin-bottom:0;">
          <input id="qSearch" placeholder="Search room number or staff name">
          <select id="qStatus">
            <option value="">All Status</option>
            <option value="Clean">Clean</option>
            <option value="Dirty">Dirty</option>
            <option value="In Progress">In Progress</option>
            <option value="Maintenance">Maintenance</option>
          </select>
          <div></div>
          <button class="btn btn-secondary" onclick="applyFilters()">Filter</button>
          <button class="btn btn-secondary" onclick="resetFilters()">Reset</button>
        </div>
      </div>

      <div class="card" style="margin-bottom:12px;">
        <h3 style="margin:0 0 10px;font-size:1rem;">Room Status Grid</h3>
        <div id="roomGrid" class="status-grid"></div>
      </div>

      <div class="card">
        <h3 style="margin:0 0 10px;font-size:1rem;">Housekeeping Tasks</h3>
        <div id="taskTable" class="table-wrap"><div class="empty">Loading tasks...</div></div>
      </div>
    </div>
  </div>

  <div id="taskModal" class="modal-overlay">
    <div class="modal">
      <h2 id="taskModalTitle">Assign Housekeeping Task</h2>
      <form id="taskForm">
        <div class="form-grid">
          <div class="form-group"><label>Room Number</label><select id="fRoom" required></select></div>
          <div class="form-group"><label>Assigned Staff</label><select id="fStaff"></select></div>
          <div class="form-group"><label>Status</label><select id="fStatus" required><option>Dirty</option><option>In Progress</option><option>Clean</option><option>Maintenance</option></select></div>
          <div class="form-group"><label>Assigned Date</label><input id="fAssigned" type="datetime-local" required></div>
          <div class="form-group"><label>Completed Date</label><input id="fCompleted" type="datetime-local"></div>
          <div class="form-group full"><label>Notes</label><textarea id="fNotes" placeholder="Cleaning notes or maintenance comments"></textarea></div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
          <button class="btn btn-primary" type="submit" id="saveBtn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div id="deleteModal" class="modal-overlay">
    <div class="modal" style="max-width:420px;">
      <h2>Delete Task</h2>
      <p id="deleteText">Are you sure?</p>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
        <button type="button" class="btn btn-delete" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <script src="/sitesh/app.js"></script>
  <script>
    if (!initAppPage('housekeeping')) throw new Error('Not authenticated');

    const ROOM_STATUS_API = BASE + '/api/room-status';
    const TASK_API = BASE + '/api/housekeeping-tasks';
    const STAFF_API = BASE + '/api/staff';
    const ROOMS_API = BASE + '/api/rooms/capacity';

    let rooms = [];
    let staff = [];
    let roomStatusRows = [];
    let allTasks = [];
    let visibleTasks = [];
    let editingId = null;
    let deleteId = null;

    const roomGrid = document.getElementById('roomGrid');
    const taskTable = document.getElementById('taskTable');
    const taskModal = document.getElementById('taskModal');
    const deleteModal = document.getElementById('deleteModal');
    const taskForm = document.getElementById('taskForm');

    function esc(v) { return String(v || '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
    function fmtDate(value) {
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return '-';
      return d.toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }
    function toLocalDateTimeValue(iso) {
      const d = iso ? new Date(iso) : new Date();
      if (Number.isNaN(d.getTime())) return '';
      const p = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
    }
    function statusClass(status) {
      if (status === 'Clean') return 'clean';
      if (status === 'Dirty') return 'dirty';
      if (status === 'In Progress') return 'progress';
      return 'maintenance';
    }

    function normalizeTaskStatus(status) {
      return ['Clean', 'Dirty', 'In Progress', 'Maintenance'].includes(status) ? status : 'Dirty';
    }

    function staffOptions(selectedId) {
      const options = ['<option value="">Unassigned</option>'];
      staff.forEach((s) => {
        const selected = String(s.id) === String(selectedId || '') ? 'selected' : '';
        options.push(`<option value="${s.id}" ${selected}>${esc(s.name)} (${esc(s.role)})</option>`);
      });
      return options.join('');
    }

    function roomOptions(selectedRoom) {
      return rooms.map((room) => `<option value="${room}" ${String(room) === String(selectedRoom || '') ? 'selected' : ''}>Room ${room}</option>`).join('');
    }

    function renderRoomGrid() {
      if (!roomStatusRows.length) {
        roomGrid.innerHTML = '<div class="empty">No room status found.</div>';
        return;
      }

      roomGrid.innerHTML = roomStatusRows.map((r) => `
        <div class="room-card">
          <div>
            <div class="room-title">Room ${esc(r.room_number)}</div>
            <div><span class="badge ${statusClass(normalizeTaskStatus(r.status))}">${esc(normalizeTaskStatus(r.status))}</span></div>
            <div class="small">Assigned Staff: ${esc(r.assigned_staff_name || '-')}</div>
            <div class="small">Last Cleaned: ${r.last_cleaned ? fmtDate(r.last_cleaned) : '-'}</div>
          </div>
          <div>
            <label class="small">Update Status</label>
            <select id="cardStatus-${esc(r.room_number)}">
              <option ${normalizeTaskStatus(r.status) === 'Clean' ? 'selected' : ''}>Clean</option>
              <option ${normalizeTaskStatus(r.status) === 'Dirty' ? 'selected' : ''}>Dirty</option>
              <option ${normalizeTaskStatus(r.status) === 'In Progress' ? 'selected' : ''}>In Progress</option>
              <option ${normalizeTaskStatus(r.status) === 'Maintenance' ? 'selected' : ''}>Maintenance</option>
            </select>
          </div>
          <div>
            <label class="small">Assign Staff</label>
            <select id="cardStaff-${esc(r.room_number)}">${staffOptions(r.assigned_staff || '')}</select>
          </div>
          <button class="btn btn-save" onclick="saveCardStatus('${esc(r.room_number)}')">Save</button>
        </div>
      `).join('');
    }

    function renderTasks() {
      if (!visibleTasks.length) {
        taskTable.innerHTML = '<div class="empty">No housekeeping tasks found.</div>';
        return;
      }

      const rows = visibleTasks.map((t) => `
        <tr>
          <td>#${t.id}</td>
          <td>Room ${esc(t.room_number)}</td>
          <td>${esc(t.staff_name || '-')}</td>
          <td><span class="badge ${statusClass(normalizeTaskStatus(t.status))}">${esc(normalizeTaskStatus(t.status))}</span></td>
          <td>${fmtDate(t.assigned_date)}</td>
          <td>${t.completed_date ? fmtDate(t.completed_date) : '-'}</td>
          <td>${esc(t.notes || '-')}</td>
          <td>
            <div class="actions">
              <button class="btn btn-edit" onclick="openTaskModal(${t.id})">Edit</button>
              <button class="btn btn-delete" onclick="openDeleteModal(${t.id})">Delete</button>
            </div>
          </td>
        </tr>
      `).join('');

      taskTable.innerHTML = `
        <table>
          <thead><tr><th>ID</th><th>Room</th><th>Assigned Staff</th><th>Status</th><th>Assigned</th><th>Completed</th><th>Notes</th><th>Actions</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function applyFilters() {
      const search = document.getElementById('qSearch').value.trim().toLowerCase();
      const status = document.getElementById('qStatus').value;

      visibleTasks = allTasks.filter((t) => {
        const statusMatch = !status || normalizeTaskStatus(t.status) === status;
        if (!statusMatch) return false;
        if (!search) return true;
        return String(t.room_number || '').toLowerCase().includes(search) || String(t.staff_name || '').toLowerCase().includes(search);
      });

      renderTasks();
    }

    function resetFilters() {
      document.getElementById('qSearch').value = '';
      document.getElementById('qStatus').value = '';
      visibleTasks = allTasks.slice();
      renderTasks();
    }

    function resetForm() {
      taskForm.reset();
      editingId = null;
      document.getElementById('taskModalTitle').textContent = 'Assign Housekeeping Task';
      document.getElementById('saveBtn').textContent = 'Save';
      document.getElementById('fRoom').innerHTML = roomOptions('');
      document.getElementById('fStaff').innerHTML = staffOptions('');
      document.getElementById('fStatus').value = 'Dirty';
      document.getElementById('fAssigned').value = toLocalDateTimeValue(new Date().toISOString());
      document.getElementById('fCompleted').value = '';
      document.getElementById('fNotes').value = '';
    }

    async function loadRooms() {
      const res = await fetch(ROOMS_API, { headers: Auth.headers() });
      if (res.status === 401 || res.status === 403) return Auth.logout();
      if (!res.ok) throw new Error('Failed to load rooms');
      const map = await res.json();
      rooms = Object.keys(map).sort();
    }

    async function loadStaff() {
      const res = await fetch(STAFF_API, { headers: Auth.headers() });
      if (res.status === 401 || res.status === 403) return Auth.logout();
      if (!res.ok) throw new Error('Failed to load staff');
      staff = await res.json();
    }

    async function loadRoomStatus() {
      const status = document.getElementById('qStatus').value;
      const qp = status ? `?status=${encodeURIComponent(status)}` : '';
      const res = await fetch(ROOM_STATUS_API + qp, { headers: Auth.headers() });
      if (res.status === 401 || res.status === 403) return Auth.logout();
      if (!res.ok) throw new Error('Failed to load room status');
      roomStatusRows = await res.json();
      renderRoomGrid();
    }

    async function loadTasks() {
      taskTable.innerHTML = '<div class="empty">Loading tasks...</div>';
      const res = await fetch(TASK_API, { headers: Auth.headers() });
      if (res.status === 401 || res.status === 403) return Auth.logout();
      if (!res.ok) throw new Error('Failed to load tasks');
      allTasks = await res.json();
      visibleTasks = allTasks.slice();
      applyFilters();
    }

    async function saveCardStatus(roomNumber) {
      const status = document.getElementById(`cardStatus-${roomNumber}`).value;
      const staffId = document.getElementById(`cardStaff-${roomNumber}`).value;
      try {
        const res = await fetch(`${ROOM_STATUS_API}/${encodeURIComponent(roomNumber)}`, {
          method: 'POST',
          headers: Auth.headers(),
          body: JSON.stringify({
            status,
            assigned_staff: staffId,
            last_cleaned: status === 'Clean' ? new Date().toISOString() : ''
          })
        });
        if (res.status === 401 || res.status === 403) return Auth.logout();
        const data = await res.json();
        if (!res.ok) return showToast(data.error || 'Failed to save room status', 'error');
        showToast('Room status updated', 'success');
        loadRoomStatus();
      } catch {
        showToast('Failed to save room status', 'error');
      }
    }

    function openTaskModal(id = null) {
      resetForm();
      if (id) {
        const task = allTasks.find((x) => x.id === id);
        if (!task) return showToast('Task not found', 'error');
        editingId = id;
        document.getElementById('taskModalTitle').textContent = `Edit Task #${id}`;
        document.getElementById('saveBtn').textContent = 'Update';
        document.getElementById('fRoom').innerHTML = roomOptions(task.room_number);
        document.getElementById('fStaff').innerHTML = staffOptions(task.staff_id || '');
        document.getElementById('fStatus').value = normalizeTaskStatus(task.status);
        document.getElementById('fAssigned').value = toLocalDateTimeValue(task.assigned_date);
        document.getElementById('fCompleted').value = task.completed_date ? toLocalDateTimeValue(task.completed_date) : '';
        document.getElementById('fNotes').value = task.notes || '';
      }
      taskModal.classList.add('open');
    }

    function closeTaskModal() {
      taskModal.classList.remove('open');
      resetForm();
    }

    function openDeleteModal(id) {
      const task = allTasks.find((x) => x.id === id);
      if (!task) return showToast('Task not found', 'error');
      deleteId = id;
      document.getElementById('deleteText').textContent = `Delete task #${id} for Room ${task.room_number}?`;
      deleteModal.classList.add('open');
    }

    function closeDeleteModal() {
      deleteId = null;
      deleteModal.classList.remove('open');
    }

    async function confirmDelete() {
      if (!deleteId) return;
      try {
        const res = await fetch(`${TASK_API}/${deleteId}`, { method: 'DELETE', headers: Auth.headers() });
        if (res.status === 401 || res.status === 403) return Auth.logout();
        const data = await res.json();
        if (!res.ok) return showToast(data.error || 'Failed to delete task', 'error');
        showToast('Task deleted', 'success');
        closeDeleteModal();
        await Promise.all([loadTasks(), loadRoomStatus()]);
      } catch {
        showToast('Failed to delete task', 'error');
      }
    }

    taskForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        room_number: document.getElementById('fRoom').value,
        staff_id: document.getElementById('fStaff').value || null,
        status: document.getElementById('fStatus').value,
        priority: 'Normal',
        assigned_date: new Date(document.getElementById('fAssigned').value).toISOString(),
        completed_date: document.getElementById('fCompleted').value ? new Date(document.getElementById('fCompleted').value).toISOString() : '',
        notes: document.getElementById('fNotes').value.trim()
      };

      const method = editingId ? 'PUT' : 'POST';
      const url = editingId ? `${TASK_API}/${editingId}` : TASK_API;

      try {
        const res = await fetch(url, { method, headers: Auth.headers(), body: JSON.stringify(payload) });
        if (res.status === 401 || res.status === 403) return Auth.logout();
        const data = await res.json();
        if (!res.ok) return showToast(data.error || 'Failed to save task', 'error');
        showToast(editingId ? 'Task updated' : 'Task assigned', 'success');
        closeTaskModal();
        await Promise.all([loadTasks(), loadRoomStatus()]);
      } catch {
        showToast('Failed to save task', 'error');
      }
    });

    taskModal.addEventListener('click', (e) => { if (e.target === taskModal) closeTaskModal(); });
    deleteModal.addEventListener('click', (e) => { if (e.target === deleteModal) closeDeleteModal(); });
    document.getElementById('qSearch').addEventListener('input', applyFilters);
    document.getElementById('qStatus').addEventListener('change', () => {
      loadRoomStatus().catch(() => showToast('Failed to filter room status', 'error'));
      applyFilters();
    });

    window.applyFilters = applyFilters;
    window.resetFilters = resetFilters;
    window.saveCardStatus = saveCardStatus;
    window.openTaskModal = openTaskModal;
    window.closeTaskModal = closeTaskModal;
    window.openDeleteModal = openDeleteModal;
    window.closeDeleteModal = closeDeleteModal;
    window.confirmDelete = confirmDelete;

    (async function init() {
      try {
        await Promise.all([loadRooms(), loadStaff()]);
        resetForm();
        await Promise.all([loadRoomStatus(), loadTasks()]);
      } catch {
        showToast('Failed to initialize housekeeping page', 'error');
      }
    })();
  </script>
</body>
</html>
