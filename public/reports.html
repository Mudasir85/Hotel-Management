<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - Hotel Booking System</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
    .container { padding: 24px; }
    .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
    .top h1 { margin: 0 0 6px; font-size: 1.45rem; }
    .sub { margin: 0; color: #6b7280; font-size: .92rem; }
    .btn { border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: .9rem; padding: 9px 12px; }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-secondary { background: #6b7280; color: #fff; }
    .toolbar { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; margin-bottom: 12px; display: grid; grid-template-columns: minmax(140px, 180px) auto auto auto; gap: 8px; align-items: center; }
    .toolbar select { border: 1px solid #d1d5db; border-radius: 8px; padding: 9px 10px; font-size: .9rem; }
    .summary-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 12px; }
    .summary-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 14px; }
    .summary-card .label { color: #6b7280; font-size: .82rem; margin-bottom: 6px; }
    .summary-card .value { color: #111827; font-size: 1.22rem; font-weight: 700; }
    .chart-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .card.wide { grid-column: 1 / -1; }
    .card h3 { margin: 0 0 10px; font-size: 1rem; color: #111827; }
    .chart-wrap { height: 320px; }
    .empty { padding: 24px; text-align: center; color: #6b7280; border: 1px dashed #d1d5db; border-radius: 10px; }
    @media print {
      #app-navbar, .toolbar { display: none !important; }
      .main-content { padding-top: 0 !important; }
      .container { padding: 8px; }
      .chart-wrap { height: 260px; }
    }
    @media (max-width: 1100px) {
      .toolbar { grid-template-columns: 1fr 1fr; }
      .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .chart-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 760px) {
      .top { flex-direction: column; align-items: stretch; }
      .summary-grid { grid-template-columns: 1fr; }
      .toolbar { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app-navbar"></div>
  <div class="main-content">
    <div class="container">
      <div class="top">
        <div>
          <h1>Reports</h1>
          <p class="sub">Revenue, occupancy, orders, and bookings analytics</p>
        </div>
      </div>

      <div class="toolbar">
        <select id="range">
          <option value="today">Today</option>
          <option value="week">Week</option>
          <option value="month" selected>Month</option>
          <option value="year">Year</option>
        </select>
        <button class="btn btn-primary" onclick="loadReports()">Apply</button>
        <button class="btn btn-secondary" onclick="exportExcel()">Export Excel</button>
        <button class="btn btn-secondary" onclick="exportPdf()">Export PDF</button>
      </div>

      <div class="summary-grid">
        <div class="summary-card"><div class="label">Total Revenue</div><div class="value" id="sumRevenue">₹0</div></div>
        <div class="summary-card"><div class="label">Average Occupancy %</div><div class="value" id="sumOccupancy">0%</div></div>
        <div class="summary-card"><div class="label">Total Orders</div><div class="value" id="sumOrders">0</div></div>
        <div class="summary-card"><div class="label">Total Bookings</div><div class="value" id="sumBookings">0</div></div>
      </div>

      <div class="chart-grid">
        <div class="card wide">
          <h3>Revenue Trend (Room vs Food vs Total)</h3>
          <div class="chart-wrap"><canvas id="revenueChart"></canvas></div>
        </div>
        <div class="card">
          <h3>Daily Occupancy Rates</h3>
          <div class="chart-wrap"><canvas id="occupancyChart"></canvas></div>
        </div>
        <div class="card">
          <h3>Top 10 Menu Items</h3>
          <div class="chart-wrap"><canvas id="menuChart"></canvas></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/sitesh/app.js"></script>
  <script>
    if (!initAppPage('reports')) throw new Error('Not authenticated');

    const REPORT_API = BASE + '/api/reports/overview';
    const PAYMENTS_API = BASE + '/api/payments';
    const ORDERS_API = BASE + '/api/orders';
    const BOOKINGS_API = BASE + '/api/bookings';

    const charts = { revenue: null, occupancy: null, menu: null };
    let lastReport = null;
    let loadRequestSeq = 0;

    function esc(v) { return String(v || '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
    function money(v) { return `₹${Number(v || 0).toFixed(0)}`; }

    function getRange() {
      return document.getElementById('range').value;
    }

    function parseISO(value) {
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function ensureChartsReady(timeoutMs = 3000) {
      const start = Date.now();
      while (typeof Chart === 'undefined' && Date.now() - start < timeoutMs) {
        await sleep(100);
      }
      return typeof Chart !== 'undefined';
    }

    function getWindow(range) {
      const now = new Date();
      const end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999);
      const start = new Date(end);
      if (range === 'today') {
        start.setHours(0, 0, 0, 0);
      } else if (range === 'week') {
        start.setDate(start.getDate() - 6);
        start.setHours(0, 0, 0, 0);
      } else if (range === 'month') {
        start.setDate(1);
        start.setHours(0, 0, 0, 0);
      } else {
        start.setMonth(0, 1);
        start.setHours(0, 0, 0, 0);
      }
      return { start, end };
    }

    function inRange(value, range) {
      const d = parseISO(value);
      if (!d) return false;
      const { start, end } = getWindow(range);
      return d >= start && d <= end;
    }

    function dayKey(value) {
      const d = parseISO(value);
      if (!d) return '';
      return d.toISOString().slice(0, 10);
    }

    function buildRevenueSeries(payments, range) {
      const filtered = payments.filter((p) => inRange(p.date, range));
      const days = [...new Set(filtered.map((p) => dayKey(p.date)).filter(Boolean))].sort();
      const roomMap = new Map();
      const foodMap = new Map();
      const totalMap = new Map();

      filtered.forEach((p) => {
        const day = dayKey(p.date);
        if (!day) return;
        const amount = Number(p.amount || 0);
        totalMap.set(day, (totalMap.get(day) || 0) + amount);
        if (p.type === 'Room') roomMap.set(day, (roomMap.get(day) || 0) + amount);
        if (p.type === 'Food') foodMap.set(day, (foodMap.get(day) || 0) + amount);
      });

      return {
        labels: days,
        room: days.map((d) => Number(roomMap.get(d) || 0)),
        food: days.map((d) => Number(foodMap.get(d) || 0)),
        total: days.map((d) => Number(totalMap.get(d) || 0))
      };
    }

    function revenueSeriesFromOverview(overview) {
      const trend = Array.isArray(overview && overview.revenue_trend) ? overview.revenue_trend : [];
      const labels = trend.map((row) => row.day).filter(Boolean);
      const totals = trend.map((row) => Number(row && row.value ? row.value : 0));
      return {
        labels,
        room: labels.map(() => 0),
        food: labels.map(() => 0),
        total: totals
      };
    }

    function renderRevenueChart(series) {
      if (typeof Chart === 'undefined') return;
      if (charts.revenue) charts.revenue.destroy();
      charts.revenue = new Chart(document.getElementById('revenueChart'), {
        type: 'line',
        data: {
          labels: series.labels,
          datasets: [
            { label: 'Room Revenue', data: series.room, borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,.12)', tension: .3, fill: false },
            { label: 'Food Revenue', data: series.food, borderColor: '#0ea5e9', backgroundColor: 'rgba(14,165,233,.12)', tension: .3, fill: false },
            { label: 'Total Revenue', data: series.total, borderColor: '#16a34a', backgroundColor: 'rgba(22,163,74,.16)', tension: .3, fill: true }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom' } }
        }
      });
    }

    function renderOccupancyChart(rows) {
      if (typeof Chart === 'undefined') return;
      if (charts.occupancy) charts.occupancy.destroy();
      charts.occupancy = new Chart(document.getElementById('occupancyChart'), {
        type: 'bar',
        data: {
          labels: (rows || []).map((r) => r.day),
          datasets: [{
            label: 'Occupancy %',
            data: (rows || []).map((r) => Number(r.occupancy_percent || 0).toFixed(1)),
            backgroundColor: '#1d4ed8'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom' } }
        }
      });
    }

    function renderMenuChart(items) {
      if (typeof Chart === 'undefined') return;
      if (charts.menu) charts.menu.destroy();
      charts.menu = new Chart(document.getElementById('menuChart'), {
        type: 'bar',
        data: {
          labels: (items || []).map((x) => x.name),
          datasets: [{
            label: 'Qty Ordered',
            data: (items || []).map((x) => Number(x.ordered_qty || 0)),
            backgroundColor: '#0284c7'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          indexAxis: 'y',
          plugins: { legend: { position: 'bottom' } }
        }
      });
    }

    function setSummary(payload) {
      document.getElementById('sumRevenue').textContent = money(payload.totalRevenue);
      document.getElementById('sumOccupancy').textContent = `${Number(payload.averageOccupancy || 0).toFixed(1)}%`;
      document.getElementById('sumOrders').textContent = Number(payload.totalOrders || 0);
      document.getElementById('sumBookings').textContent = Number(payload.totalBookings || 0);
    }

    function toCsvRows(report) {
      const rows = [['Metric', 'Value']];
      rows.push(['Total Revenue', Number(report.totalRevenue || 0).toFixed(2)]);
      rows.push(['Average Occupancy %', Number(report.averageOccupancy || 0).toFixed(2)]);
      rows.push(['Total Orders', Number(report.totalOrders || 0)]);
      rows.push(['Total Bookings', Number(report.totalBookings || 0)]);
      rows.push([]);
      rows.push(['Date', 'Room Revenue', 'Food Revenue', 'Total Revenue']);
      report.revenue.labels.forEach((label, i) => {
        rows.push([
          label,
          Number(report.revenue.room[i] || 0).toFixed(2),
          Number(report.revenue.food[i] || 0).toFixed(2),
          Number(report.revenue.total[i] || 0).toFixed(2)
        ]);
      });
      return rows;
    }

    async function fetchJsonWithRetry(url, options = {}, retries = 2, retryDelayMs = 250) {
      for (let attempt = 0; attempt <= retries; attempt += 1) {
        try {
          const response = await fetch(url, options);
          if (response.status === 401 || response.status === 403) {
            return { authError: true, status: response.status };
          }
          if (!response.ok) {
            const retriable = response.status >= 500 || response.status === 429;
            if (retriable && attempt < retries) {
              await sleep(retryDelayMs * (attempt + 1));
              continue;
            }
            return { ok: false, status: response.status };
          }

          const data = await response.json();
          return { ok: true, data };
        } catch (error) {
          if (attempt < retries) {
            await sleep(retryDelayMs * (attempt + 1));
            continue;
          }
          return { ok: false, error };
        }
      }
      return { ok: false };
    }

    async function loadReports() {
      const range = getRange();
      const requestId = ++loadRequestSeq;
      try {
        const [overviewResult, paymentsResult, ordersResult, bookingsResult] = await Promise.all([
          fetchJsonWithRetry(`${REPORT_API}?range=${encodeURIComponent(range)}`, { headers: Auth.headers() }),
          fetchJsonWithRetry(PAYMENTS_API, { headers: Auth.headers() }),
          fetchJsonWithRetry(ORDERS_API, { headers: Auth.headers() }),
          fetchJsonWithRetry(BOOKINGS_API, { headers: Auth.headers() })
        ]);

        if (requestId !== loadRequestSeq) return;

        if ([overviewResult, paymentsResult, ordersResult, bookingsResult].some((r) => r && r.authError)) {
          return Auth.logout();
        }
        if (!overviewResult || !overviewResult.ok) {
          showToast('Failed to load reports data', 'error');
          return;
        }

        const overview = overviewResult.data || {};
        const payments = paymentsResult && paymentsResult.ok && Array.isArray(paymentsResult.data) ? paymentsResult.data : [];
        const orders = ordersResult && ordersResult.ok && Array.isArray(ordersResult.data) ? ordersResult.data : [];
        const bookings = bookingsResult && bookingsResult.ok && Array.isArray(bookingsResult.data) ? bookingsResult.data : [];

        const revenue = payments.length ? buildRevenueSeries(payments, range) : revenueSeriesFromOverview(overview);
        const totalRevenue = revenue.total.reduce((sum, v) => sum + Number(v || 0), 0);
        const totalOrders = orders.length
          ? orders.filter((o) => inRange(o.order_date, range)).length
          : Number(overview.total_orders || 0);
        const totalBookings = bookings.length
          ? bookings.filter((b) => inRange(b.check_in_date, range)).length
          : Number(overview.total_bookings || 0);

        const payload = {
          range,
          totalRevenue,
          averageOccupancy: Number(overview.average_occupancy_percent || 0),
          totalOrders,
          totalBookings,
          revenue,
          occupancy: overview.occupancy_report || [],
          topMenu: (overview.menu_performance && overview.menu_performance.top_items ? overview.menu_performance.top_items : []).slice(0, 10)
        };

        lastReport = payload;
        setSummary(payload);
        const chartsReady = await ensureChartsReady();
        if (requestId !== loadRequestSeq) return;
        if (chartsReady) {
          renderRevenueChart(payload.revenue);
          renderOccupancyChart(payload.occupancy);
          renderMenuChart(payload.topMenu);
        }

        const partialFailures = [paymentsResult, ordersResult, bookingsResult].some((r) => !r || !r.ok);
        if (!chartsReady) {
          showToast('Report data updated. Charts are still loading.', 'info', 2200);
        } else if (partialFailures) {
          showToast('Report loaded with partial data', 'info', 2200);
        } else {
          showToast('Reports updated', 'success', 1600);
        }
      } catch {
        if (requestId !== loadRequestSeq) return;
        showToast('Failed to load reports', 'error');
      }
    }

    function exportExcel() {
      if (!lastReport) return showToast('Load report first', 'error');
      const rows = toCsvRows(lastReport);
      const csv = rows.map((row) => row.map((v) => `"${String(v || '').replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `reports-${lastReport.range}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('Excel export generated', 'success');
    }

    function exportPdf() {
      if (!lastReport) return showToast('Load report first', 'error');
      window.print();
      showToast('Print dialog opened for PDF export', 'info');
    }

    window.loadReports = loadReports;
    window.exportExcel = exportExcel;
    window.exportPdf = exportPdf;

    loadReports();
  </script>
</body>
</html>
